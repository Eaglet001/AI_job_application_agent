version: "3.9"

services:
  job-agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: job-agent-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./uploads:/app/uploads       # Persist uploaded CVs
      - ./outputs:/app/outputs       # Persist generated DOCX files
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # Optional: ChromaDB for storing past CV/JD embeddings
  chromadb:
    image: chromadb/chroma:latest
    container_name: job-agent-chromadb
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    restart: unless-stopped

volumes:
  chroma_data:
